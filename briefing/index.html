<script>
// Reduced motion check
const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

// Scroll reveal — IntersectionObserver (Lenis-safe, pure inline styles)
function revealElement(el) {
  el.classList.add('revealed');
  // Force a paint frame at opacity:0, then transition to opacity:1
  requestAnimationFrame(() => {
    el.style.transition = 'opacity 0.6s ease, transform 0.6s ease';
    el.style.opacity = '1';
    el.style.transform = 'translateY(0)';
  });
}
if (!prefersReducedMotion) {
  const observer = new IntersectionObserver((entries) => {
    entries.forEach((entry) => {
      if (entry.isIntersecting) {
        if (entry.target.classList.contains('stagger-item')) {
          const parent = entry.target.parentElement;
          const siblings = [...parent.querySelectorAll('.stagger-item')];
          const idx = siblings.indexOf(entry.target);
          setTimeout(() => revealElement(entry.target), idx * 100);
        } else {
          revealElement(entry.target);
        }
        observer.unobserve(entry.target);
      }
    });
  }, { threshold: 0.1 });
  document.querySelectorAll('[data-reveal], .stagger-item').forEach(el => observer.observe(el));
}

// Lenis smooth scroll + GSAP sync
try {
  if (typeof Lenis !== 'undefined' && !prefersReducedMotion) {
    const lenis = new Lenis({ lerp: 0.1, smoothWheel: true });
    if (typeof gsap !== 'undefined' && typeof ScrollTrigger !== 'undefined') {
      gsap.registerPlugin(ScrollTrigger);
      lenis.on('scroll', ScrollTrigger.update);
      gsap.ticker.add((time) => { lenis.raf(time * 1000); });
      gsap.ticker.lagSmoothing(0);
    }
  }
} catch(e) {}

// GSAP parallax on [data-parallax]
try {
  if (typeof gsap !== 'undefined' && typeof ScrollTrigger !== 'undefined' && !prefersReducedMotion) {
    document.querySelectorAll('[data-parallax]').forEach(el => {
      const img = el.querySelector('.parallax-bg');
      if (img) {
        gsap.fromTo(img, { y: '-15%' }, {
          y: '15%', ease: 'none',
          scrollTrigger: { trigger: el, start: 'top bottom', end: 'bottom top', scrub: true }
        });
      }
    });
  }
} catch(e) {}
</script>
